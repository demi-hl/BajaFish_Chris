<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 80" width="120" height="80">
  <defs>
    <linearGradient id="bodyGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0e5a8a"/>
      <stop offset="50%" stop-color="#083C5D"/>
      <stop offset="100%" stop-color="#0B1F33"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FFC72C"/>
      <stop offset="100%" stop-color="#ffda6a"/>
    </linearGradient>
    <linearGradient id="finGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F5F7FA"/>
      <stop offset="60%" stop-color="#b0c8e0"/>
      <stop offset="100%" stop-color="#083C5D"/>
    </linearGradient>
  </defs>
  <!-- Body -->
  <path d="M15,42 Q20,28 40,25 Q60,22 80,30 Q95,36 100,42 Q95,50 80,54 Q60,58 40,55 Q20,52 15,42 Z" fill="url(#bodyGrad)" stroke="#0B1F33" stroke-width="0.5"/>
  <!-- Belly highlight -->
  <path d="M25,44 Q40,50 70,50 Q85,48 95,43 Q85,50 70,53 Q45,55 25,48 Z" fill="#0e5a8a" opacity="0.5"/>
  <!-- Dorsal fin -->
  <path d="M45,25 Q50,8 65,12 Q60,18 55,24" fill="url(#finGrad)" stroke="#083C5D" stroke-width="0.5"/>
  <!-- Tail fin -->
  <path d="M15,42 Q5,30 2,22 Q10,32 15,38" fill="url(#finGrad)" stroke="#083C5D" stroke-width="0.5"/>
  <path d="M15,42 Q5,52 2,60 Q10,50 15,46" fill="url(#finGrad)" stroke="#083C5D" stroke-width="0.5"/>
  <!-- Pectoral fin -->
  <path d="M60,42 Q55,50 48,55 Q55,48 62,44" fill="url(#finGrad)" opacity="0.7"/>
  <!-- Eye -->
  <circle cx="82" cy="36" r="5" fill="#F5F7FA" stroke="#0B1F33" stroke-width="0.8"/>
  <circle cx="83" cy="35.5" r="2.5" fill="#0B1F33"/>
  <circle cx="84" cy="34.5" r="0.8" fill="#F5F7FA"/>
  <!-- Mouth -->
  <path d="M95,42 Q102,40 108,38" fill="none" stroke="#0B1F33" stroke-width="1.2" stroke-linecap="round"/>
  <!-- Golden stripe -->
  <path d="M20,42 Q50,38 95,40" fill="none" stroke="url(#accentGrad)" stroke-width="2.5" stroke-linecap="round" opacity="0.9"/>
  <!-- Gill line -->
  <path d="M75,32 Q73,40 75,50" fill="none" stroke="#0B1F33" stroke-width="0.8" opacity="0.4"/>
</svg>