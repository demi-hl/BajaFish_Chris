<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>BAJAFISH — Know Before You Go</title>
  <!-- The marketing site at /site/ is the front door. This root page only
       redirects there and cleans up any stale app service worker / cache that
       used to serve the old login screen. -->
  <meta http-equiv="refresh" content="0; url=/site/index.html">
  <link rel="canonical" href="/site/index.html">
  <meta name="robots" content="noindex">
  <style>
    html,body{margin:0;height:100%;background:#010810;color:#dbe7f0;
      font:500 16px/1.5 system-ui,-apple-system,Segoe UI,Roboto,sans-serif}
    .wrap{display:flex;align-items:center;justify-content:center;height:100%}
    a{color:#ffd24a}
  </style>
  <script>
    (function () {
      // Evict the retired app's service worker + caches so the login screen
      // can never be served again, then go straight to the marketing site.
      try {
        if ('serviceWorker' in navigator && navigator.serviceWorker.getRegistrations) {
          navigator.serviceWorker.getRegistrations().then(function (regs) {
            regs.forEach(function (r) {
              var scope = (r.scope || '').replace(location.origin, '');
              if (scope === '/' || scope === '') r.unregister();
            });
          }).catch(function () {});
        }
        if (window.caches && caches.keys) {
          caches.keys().then(function (keys) {
            keys.forEach(function (k) { if (/^bajafish-v[12]$/.test(k)) caches.delete(k); });
          }).catch(function () {});
        }
      } catch (e) {}
      location.replace('/site/index.html');
    })();
  </script>
</head>
<body>
  <div class="wrap">
    <p>Redirecting to BajaFish&hellip;
      <noscript><br><a href="/site/index.html">Continue &rarr;</a></noscript>
    </p>
  </div>
</body>
</html>
